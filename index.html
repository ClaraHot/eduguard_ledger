<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>TRUTHLENS OS // VIBRANT EDITION</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root { 
            --neon-main: #00f2ff;
            --bg-deep: #020205;
            --grad-main: linear-gradient(135deg, #0072ff 0%, #00f2ff 100%);
            --neon-pink: #160fe6;
        }
        
        /* CLASSES DE THÈMES DYNAMIQUES */
        .theme-jumelle { --neon-main: #4329ee; --grad-main: linear-gradient(135deg, #3e3ef6 0%, #2c57d8 100%); }
        .theme-multimedia { --neon-main: #bc13fe; --grad-main: linear-gradient(135deg, #6a00ff 0%, #bc13fe 100%); }
        .theme-xray { --neon-main: #00ff41; --grad-main: linear-gradient(135deg, #009929 0%, #00ff41 100%); }

        body { 
            font-family: 'Orbitron', sans-serif; 
            background: var(--bg-deep);
            color: white; 
            margin: 0; 
            height: 100vh; 
            overflow: hidden;
            transition: background 0.5s ease;
        }

        body::after {
            content: " "; 
            position: fixed; 
            top: 0; left: 0; 
            width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.02), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.02));
            background-size: 100% 3px, 3px 100%; 
            pointer-events: none; 
            z-index: 1000;
        }
        
        /* LOGIN SCREEN - MISE À JOUR POUR MATCHER L'IMAGE */
        #login-screen { 
            position: fixed; 
            inset: 0; 
            background: rgba(0,0,0,0.95); 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            z-index: 2000; 
        }
        
        .login-card { 
            background: #0a0a0a; 
            backdrop-filter: blur(20px); 
            padding: 50px 40px; 
            border: 2px solid var(--neon-pink); 
            text-align: center; 
            width: 420px; 
            border-radius: 20px; 
            box-shadow: 
                0 0 40px var(--neon-pink),
                0 0 80px rgba(12, 17, 161, 0.6),
                inset 0 0 30px rgba(255, 0, 170, 0.2);
            position: relative;
            overflow: hidden;
        }

        .login-card::before {
            content: '';
            position: absolute;
            inset: -2px;
            background: linear-gradient(45deg, transparent, rgba(255,0,170,0.15), transparent);
            border-radius: 22px;
            z-index: -1;
            animation: neon-border 3s linear infinite;
        }

        @keyframes neon-border {
            0% { opacity: 0.6; }
            50% { opacity: 1; }
            100% { opacity: 0.6; }
        }

        .login-card h1 {
            color: var(--neon-pink); 
            letter-spacing: 8px; 
            font-size: 28px; 
            font-weight: 900; 
            text-shadow: 
                0 0 10px var(--neon-pink),
                0 0 30px var(--neon-pink),
                0 0 50px var(--neon-pink);
            margin-bottom: 40px;
        }

        .login-card input {
            background: rgba(255, 255, 255, 0.95); 
            color: #111;
            border: 1px solid #ddd;
            padding: 16px 20px;
            width: 100%;
            margin-bottom: 18px;
            border-radius: 8px;
            font-size: 15px;
            font-family: 'JetBrains Mono', monospace;
            box-shadow: inset 0 2px 6px rgba(0,0,0,0.1);
            transition: all 0.3s ease;
        }

        .login-card input:focus {
            outline: none;
            border-color: var(--neon-pink);
            box-shadow: 0 0 15px var(--neon-pink);
        }

        .btn-neon-login {
            background: var(--neon-pink); 
            color: white; 
            border: none; 
            padding: 16px; 
            cursor: pointer; 
            width: 100%; 
            font-weight: 900; 
            letter-spacing: 3px; 
            font-size: 15px; 
            text-transform: uppercase;
            border-radius: 8px;
            margin-top: 10px;
            box-shadow: 
                0 0 20px var(--neon-pink),
                0 0 40px rgba(17, 104, 234, 0.7);
            transition: all 0.3s ease;
        }
        
        .btn-neon-login:hover {
            transform: translateY(-3px) scale(1.03);
            box-shadow: 
                0 0 30px var(--neon-pink),
                0 0 60px rgba(8, 16, 239, 0.9);
            filter: brightness(1.15);
        }

        #os-interface { display: none; height: 100vh; grid-template-columns: 300px 1fr; }
        .sidebar { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); border-right: 1px solid rgba(255,255,255,0.1); padding: 20px; display: flex; flex-direction: column; gap: 15px; overflow-y: auto; }
        .main-view { padding: 30px; overflow-y: auto; background: rgba(0,0,0,0.3); }
        
        .profile-upload-area { text-align: center; padding: 10px; border: 1px dashed var(--neon-main); border-radius: 10px; background: rgba(255, 255, 255, 0.02); transition: 0.5s; }
        #profile-preview { width: 80px; height: 80px; border-radius: 50%; border: 2px solid var(--neon-main); object-fit: cover; display: none; margin: 0 auto 10px; box-shadow: 0 0 15px var(--neon-main); }

        .btn-neon { 
            background: var(--grad-main); color: white; border: none; padding: 14px; cursor: pointer; width: 100%; font-weight: 900; 
            letter-spacing: 2px; font-size: 10px; clip-path: polygon(10% 0, 100% 0, 100% 75%, 90% 100%, 0 100%, 0 25%);
            transition: all 0.3s ease; text-transform: uppercase; box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }
        .btn-neon:hover { transform: translateY(-3px); filter: brightness(1.2); box-shadow: 0 5px 15px var(--neon-main); }

        #scan-container { display: grid; gap: 15px; transition: all 0.6s ease; margin-bottom: 20px; }
        .grid-jumelle { grid-template-columns: 1fr 1fr; }
        .grid-multimedia { grid-template-columns: 1fr; }
        .grid-multimedia .flux-box { height: 350px; }
        .grid-xray { grid-template-columns: repeat(3, 1fr); }

        .flux-box { background: #000; border: 2px solid var(--neon-main); height: 220px; position: relative; border-radius: 12px; overflow: hidden; transition: 0.5s; }
        video, canvas, #media-content img, #media-content video { width: 100%; height: 100%; object-fit: cover; }
        .label { position: absolute; top: 0; left: 0; font-size: 9px; font-weight: 900; color: black; background: var(--neon-main); padding: 4px 12px; border-radius: 0 0 12px 0; z-index: 5; }

        /* PANNEAU DIAGNOSTIC IA */
        #ai-diagnostic {
            background: rgba(0,0,0,0.6); border: 1px solid var(--neon-main); padding: 15px;
            border-radius: 10px; font-family: 'JetBrains Mono'; display: grid;
            grid-template-columns: repeat(4, 1fr); gap: 15px; margin-bottom: 20px;
        }
        .diag-item { border-left: 2px solid var(--neon-main); padding-left: 10px; }
        .diag-label { font-size: 8px; color: #888; text-transform: uppercase; }
        .diag-value { font-size: 11px; font-weight: bold; color: var(--neon-main); margin-top: 5px; }

        .panel { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); padding: 15px; border-radius: 12px; }
        input, select { background: rgba(0,0,0,0.5); border: 1px solid var(--neon-main); color: var(--neon-main); padding: 12px; width: 100%; font-family: 'Orbitron'; font-size: 10px; margin-bottom: 10px; border-radius: 6px; outline: none; box-sizing: border-box; }

        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: rgba(0,0,0,0.4); }
        th { color: var(--neon-main); padding: 12px; text-align: left; font-size: 10px; border-bottom: 2px solid var(--neon-main); }
        td { padding: 12px; border-bottom: 1px solid #111; font-size: 10px; }
    </style>
</head>
<body class="theme-jumelle">

    <div id="login-screen">
        <div class="login-card">
            <h1>TRUTHLENS OS</h1>
            <input type="text" id="user" placeholder="ID_EXPERT" value="expert_noor">
            <input type="password" id="pass" placeholder="PASSWORD" value="admin123">
            <button class="btn-neon-login" onclick="auth()">S'IDENTIFIER</button>
        </div>
    </div>

    <div id="os-interface">
        <div class="sidebar">
            <h2 id="status-label" style="color: var(--neon-main); font-size: 14px;">TRUTHLENS OS</h2>
            
            <div class="panel profile-upload-area">
                <img id="profile-preview" src="#" alt="Aperçu">
                <label for="profile-pic" style="font-size: 9px; color: var(--neon-main); cursor: pointer; font-weight: bold;">📁 CHARGER PHOTO PROFIL</label>
                <input type="file" id="profile-pic" accept="image/*" style="display:none" onchange="previewImage(this)">
            </div>

            <div class="panel">
                <p style="font-size: 8px; color: var(--neon-main); margin-bottom: 10px;">REGISTRE CIBLE</p>
                <input type="text" id="nom" placeholder="NOM">
                <input type="number" id="note" placeholder="NOTE (0-20)">
                <input type="text" id="matiere" placeholder="MATIÈRE">
                <button class="btn-neon" onclick="creerEtudiant()">ENREGISTRER</button>
            </div>

            <div style="margin-top: auto;">
                <button class="btn-neon" style="background: #4d1de0;" onclick="location.reload()">LOGOUT</button>
            </div>
        </div>

        <div class="main-view">
            <div id="scan-container" class="grid-jumelle">
                <div class="flux-box"><span class="label">LIVE_SCAN_A</span><video id="v1" autoplay playsinline></video></div>
                <div class="flux-box"><span class="label">LIVE_SCAN_B</span><video id="v2" autoplay playsinline></video></div>
                <div class="flux-box"><span class="label">CAPTURE_FIXE</span><canvas id="c1"></canvas></div>
                <div class="flux-box" id="media-box">
                    <span class="label">MEDIA_CONTENT</span>
                    <div id="media-content" style="height:100%"></div>
                </div>
            </div>

            <!-- PANNEAU DE RÉPONSE EXPERT -->
            <div id="ai-diagnostic">
                <div class="diag-item">
                    <div class="diag-label">Authenticité</div>
                    <div id="res-auth" class="diag-value">EN ATTENTE...</div>
                </div>
                <div class="diag-item">
                    <div class="diag-label">Rythme Cardiaque</div>
                    <div id="res-bpm" class="diag-value">-- BPM</div>
                </div>
                <div class="diag-item">
                    <div class="diag-label">Émotion détectée</div>
                    <div id="res-emo" class="diag-value">NEUTRE</div>
                </div>
                <div class="diag-item">
                    <div class="diag-label">Indice Confiance AI</div>
                    <div id="res-conf" class="diag-value">0.0%</div>
                </div>
            </div>

            <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px;">
                <button class="btn-neon" onclick="capture('billet')">📸 SCAN BILLET</button>
                <button class="btn-neon" onclick="document.getElementById('multimedia-up').click()">📂 MÉDIA / FICHIER</button>
                <input type="file" id="multimedia-up" style="display:none" onchange="loadMultimedia(this)">
                <button class="btn-neon" style="background:#7725f1" onclick="resetPhotos()">🛑 RESET IMAGES</button>
            </div>

            <div style="margin-top: 20px; display: grid; grid-template-columns: 1fr 200px; gap: 15px; align-items: end;">
                <select id="protocol">
                    <option value="JUMELLE">🚨 SCAN JUMELÉ (ROUGE)</option>
                    <option value="MULTIMEDIA">🟣 ANALYSE MULTIMÉDIA (VIOLET)</option>
                    <option value="XRAY">☢️ X-RAY DEEP SCAN (VERT)</option>
                </select>
                <button id="launch-btn" class="btn-neon" onclick="appliquerToutChanger()">ANALYSER</button>
            </div>

            <table id="table-etudiants">
                <thead><tr><th>ID</th><th>NOM</th><th>NOTE</th><th>MATIÈRE</th></tr></thead>
                <tbody></tbody>
            </table>
        </div>
    </div>

    <script>
        let token = "";

        function appliquerToutChanger() {
            const proto = document.getElementById('protocol').value;
            const body = document.body;
            const container = document.getElementById('scan-container');
            const status = document.getElementById('status-label');

            body.className = '';
            container.className = '';

            // Simulation Analyse IA
            document.getElementById('res-auth').innerText = "ANALYSE EN COURS...";
            
            setTimeout(() => {
                const results = {
                    "JUMELLE": ["AUTHENTIQUE", "115 BPM", "STRESSÉ", "98.2%"],
                    "MULTIMEDIA": ["VALIDE", "72 BPM", "CALME", "85.4%"],
                    "XRAY": ["SUSPECT", "95 BPM", "ANXIEUX", "94.0%"]
                };
                const val = results[proto];
                document.getElementById('res-auth').innerText = val[0];
                document.getElementById('res-bpm').innerText = val[1];
                document.getElementById('res-emo').innerText = val[2];
                document.getElementById('res-conf').innerText = val[3];
            }, 1500);

            if(proto === "JUMELLE") {
                body.classList.add('theme-jumelle');
                container.classList.add('grid-jumelle');
                status.innerText = "SCAN JUMELÉ ACTIVE";
            } else if(proto === "MULTIMEDIA") {
                body.classList.add('theme-multimedia');
                container.classList.add('grid-multimedia');
                status.innerText = "MULTIMEDIA ANALYSIS";
            } else if(proto === "XRAY") {
                body.classList.add('theme-xray');
                container.classList.add('grid-xray');
                status.innerText = "X-RAY DEEP SCAN";
            }
        }

        function previewImage(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = e => {
                    const img = document.getElementById('profile-preview');
                    img.src = e.target.result;
                    img.style.display = 'block';
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        function loadMultimedia(input) {
            const container = document.getElementById('media-content');
            if (input.files && input.files[0]) {
                const file = input.files[0];
                const reader = new FileReader();
                reader.onload = e => {
                    if (file.type.startsWith('video/')) {
                        container.innerHTML = `<video src="${e.target.result}" autoplay loop muted></video>`;
                    } else {
                        container.innerHTML = `<img src="${e.target.result}">`;
                    }
                };
                reader.readAsDataURL(file);
            }
        }

        async function auth() {
            const u = document.getElementById('user').value;
            const p = document.getElementById('pass').value;
            const res = await fetch('/v1/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({username: u, password: p})
            });
            const data = await res.json();
            if(data.access_token) {
                token = data.access_token;
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('os-interface').style.display = 'grid';
                initCameras();
                chargerEtudiants();
            } else { alert("Accès Refusé"); }
        }

        async function initCameras() {
            try {
                const s = await navigator.mediaDevices.getUserMedia({ video: true });
                document.getElementById('v1').srcObject = s;
                document.getElementById('v2').srcObject = s;
            } catch(e) { console.log("Caméra non détectée"); }
        }

        function capture() {
            const video = document.getElementById('v1');
            const canvas = document.getElementById('c1');
            const ctx = canvas.getContext('2d');
            canvas.width = video.videoWidth || 640;
            canvas.height = video.videoHeight || 480;
            ctx.drawImage(video, 0, 0);
        }

        function resetPhotos() {
            document.getElementById('c1').getContext('2d').clearRect(0,0,2000,2000);
            document.getElementById('media-content').innerHTML = "";
        }

        async function chargerEtudiants() {
            const res = await fetch('/v1/etudiants', { headers: {'Authorization': 'Bearer ' + token} });
            const data = await res.json();
            document.querySelector('#table-etudiants tbody').innerHTML = data.map(e => 
                `<tr><td>${e.id}</td><td>${e.nom}</td><td>${e.note}/20</td><td>${e.matiere}</td></tr>`).join('');
        }

        async function creerEtudiant() {
            const formData = new FormData();
            formData.append('nom', document.getElementById('nom').value);
            formData.append('note', document.getElementById('note').value);
            formData.append('matiere', document.getElementById('matiere').value);
            
            const fileInput = document.getElementById('profile-pic');
            if(fileInput.files[0]) {
                formData.append('photo', fileInput.files[0]);
            }

            const res = await fetch('/v1/etudiants', {
                method: 'POST',
                headers: {'Authorization': 'Bearer ' + token},
                body: formData
            });

            if(res.ok) {
                alert("Cible enregistrée avec succès !");
                chargerEtudiants();
            } else { alert("Erreur d'enregistrement."); }
        }
    </script>
</body>
</html>
